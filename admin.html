<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moda 管理员面板</title>
  <link rel="stylesheet" href="common.css">
</head>
<body>
  <div class="container">
    <!-- 头部 -->
    <div class="header">
      <h1>⚙️ <span>Moda</span> 管理面板</h1>
      <p class="subtitle">合约参数设置 · 紧急控制 · 白名单管理</p>
    </div>

    <!-- 连接栏 -->
    <div class="connect-bar">
      <div class="connect-left">
        <a href="index.html" class="btn btn-sm btn-outline" style="text-decoration:none">🏠 首页</a>
        <a href="deploy.html" class="btn btn-sm btn-outline" style="text-decoration:none">🚀 一键部署</a>
        <a href="admin.html" class="btn btn-sm" style="background:var(--accent);color:#fff;text-decoration:none;border-radius:8px;font-weight:600">⚙️ 管理</a>
      </div>
      <div class="connect-right">
        <span id="chainBadge" class="chain-badge hidden">BSC 测试网</span>
        <span id="addressBadge" class="address-badge hidden">未连接</span>
        <button id="btnConnect" class="btn btn-primary" onclick="connectWallet()">🔌 连接钱包</button>
        <button id="btnDisconnect" class="btn btn-outline hidden" onclick="disconnectWallet()">断开连接</button>
      </div>
    </div>

    <!-- 非管理员提示 -->
    <div id="notOwner" class="card" style="display:none">
      <div class="alert alert-warn">
        <strong>🔒 仅合约管理员可访问此页面</strong><br/>
        请使用部署合约的钱包地址连接。当前地址没有管理权限。
      </div>
    </div>

    <!-- 管理员内容区 -->
    <div id="adminContent" style="display:none">
      <!-- 紧急控制 -->
      <div class="card">
        <h3><span class="icon">🛡️</span> 紧急控制</h3>
        <div class="form-row mb-16">
          <button class="btn btn-danger" onclick="pause()">⏸ 暂停合约</button>
          <button class="btn btn-green" onclick="unpause()">▶ 恢复合约</button>
        </div>
        <div class="form-group">
          <label>提取 BNB 数量</label>
          <div class="flex-wrap gap-8" style="display:flex">
            <input type="number" id="withdrawBNBAmount" placeholder="0.1" step="0.01" style="flex:1" />
            <button class="btn btn-danger btn-sm" onclick="withdrawBNB()">提取 BNB</button>
          </div>
        </div>
        <div class="form-group">
          <label>提取代币数量</label>
          <div class="flex-wrap gap-8" style="display:flex">
            <input type="number" id="withdrawTokenAmount" placeholder="1000" style="flex:1" />
            <button class="btn btn-danger btn-sm" onclick="withdrawToken()">提取代币</button>
          </div>
        </div>
        <div class="form-group">
          <label>强制触发税收兑换</label>
          <button class="btn btn-outline full-width" onclick="forceSwapBack()">立即执行兑换</button>
        </div>
      </div>

      <!-- 参数设置 -->
      <div class="card">
        <h3><span class="icon">🎛️</span> 参数设置</h3>
        <div class="form-row">
          <div class="form-group">
            <label>铸造价格（wei）</label>
            <input type="text" id="setMintPrice" placeholder="10000000000000000" />
          </div>
          <div class="form-group">
            <label>每份代币数（wei）</label>
            <input type="text" id="setTokenPerMint" placeholder="1000000000000000000000" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>最大铸造份数</label>
            <input type="number" id="setMaxMintCount" placeholder="10000" />
          </div>
          <div class="form-group">
            <label>开盘时间（unix）</label>
            <input type="number" id="setLaunchTime" placeholder="1718534400" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>买入税（最大1000）</label>
            <input type="number" id="setBuyTax" placeholder="300" max="1000" />
          </div>
          <div class="form-group">
            <label>卖出税（最大1000）</label>
            <input type="number" id="setSellTax" placeholder="300" max="1000" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>营销分配比例</label>
            <input type="number" id="setMarketingShare" placeholder="4000" />
          </div>
          <div class="form-group">
            <label>销毁分配比例</label>
            <input type="number" id="setBurnShare" placeholder="1000" />
          </div>
        </div>
        <button class="btn btn-primary full-width" onclick="applySettings()">应用设置</button>
      </div>

      <!-- 白名单 / 黑名单 -->
      <div class="card">
        <h3><span class="icon">👥</span> 白名单 / 黑名单</h3>
        <div class="form-group">
          <label>地址列表（逗号分隔）</label>
          <input type="text" id="wlAddresses" placeholder="0x123...,0x456..." />
        </div>
        <div class="form-row">
          <button class="btn btn-outline btn-sm" onclick="setWhitelist(true)">加入白名单</button>
          <button class="btn btn-outline btn-sm" onclick="setWhitelist(false)">移出白名单</button>
          <button class="btn btn-danger btn-sm" onclick="setBlacklist(true)">加入黑名单</button>
          <button class="btn btn-outline btn-sm" onclick="setBlacklist(false)">移出黑名单</button>
        </div>
        <div class="mt-12">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
            <input type="checkbox" id="wlEnabled" onchange="toggleWhitelist()" />
            <span style="color:var(--text2);font-size:0.85rem">启用白名单模式</span>
          </label>
        </div>
      </div>
    </div>
  </div>

  <div id="toastContainer"></div>

  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.0/dist/ethers.umd.min.js"></script>
  <script src="common.js"></script>
  <script>
    // ============ 权限检查 ============
    function onOwnerChanged(owner) {
      const notOwner = document.getElementById('notOwner');
      const adminContent = document.getElementById('adminContent');
      if (owner) {
        notOwner.style.display = 'none';
        adminContent.style.display = '';
        loadCurrentSettings();
      } else if (userAddress) {
        notOwner.style.display = '';
        adminContent.style.display = 'none';
      } else {
        notOwner.style.display = 'none';
        adminContent.style.display = 'none';
      }
    }

    function onWalletConnected() {
      // 权限检查在 onOwnerChanged 中处理
    }

    function onWalletDisconnected() {
      document.getElementById('notOwner').style.display = 'none';
      document.getElementById('adminContent').style.display = 'none';
    }

    // ============ 加载当前设置 ============
    async function loadCurrentSettings() {
      if (!contract) return;
      try {
        const wlEnabled = await contract.whitelistEnabled();
        document.getElementById('wlEnabled').checked = wlEnabled;
      } catch(e) {}
    }

    // ============ 管理员功能 ============
    async function pause() {
      try { await (await contract.pause()).wait(); showToast('合约已暂停', 'success'); } catch(e) { showToast(e.reason||e.message, 'error'); }
    }
    async function unpause() {
      try { await (await contract.unpause()).wait(); showToast('合约已恢复', 'success'); } catch(e) { showToast(e.reason||e.message, 'error'); }
    }

    async function withdrawBNB() {
      try {
        const amount = ethers.parseEther(document.getElementById('withdrawBNBAmount').value || '0');
        if (amount <= 0) { showToast('请输入提取金额', 'error'); return; }
        await (await contract.withdrawBNB(amount)).wait();
        showToast('BNB 提取成功！', 'success');
      } catch(e) { showToast(e.reason||e.message, 'error'); }
    }

    async function withdrawToken() {
      try {
        const amount = ethers.parseEther(document.getElementById('withdrawTokenAmount').value || '0');
        if (amount <= 0) { showToast('请输入提取金额', 'error'); return; }
        await (await contract.withdrawToken(CONTRACT_ADDRESS, amount)).wait();
        showToast('代币提取成功！', 'success');
      } catch(e) { showToast(e.reason||e.message, 'error'); }
    }

    async function forceSwapBack() {
      try { await (await contract.forceSwapBack()).wait(); showToast('税收兑换完成！', 'success'); } catch(e) { showToast(e.reason||e.message, 'error'); }
    }

    async function applySettings() {
      if (!contract) return;
      try {
        const mintPrice = document.getElementById('setMintPrice').value;
        const tokenPerMint = document.getElementById('setTokenPerMint').value;
        const maxMintCount = document.getElementById('setMaxMintCount').value;
        const launchTime = document.getElementById('setLaunchTime').value;
        const buyTax = document.getElementById('setBuyTax').value;
        const sellTax = document.getElementById('setSellTax').value;
        const marketingShare = document.getElementById('setMarketingShare').value;
        const burnShare = document.getElementById('setBurnShare').value;

        const txs = [];
        if (mintPrice) txs.push(contract.setMintPrice(mintPrice));
        if (tokenPerMint) txs.push(contract.setTokenPerMint(tokenPerMint));
        if (maxMintCount) txs.push(contract.setMaxMintCount(maxMintCount));
        if (launchTime) txs.push(contract.setLaunchTime(launchTime));
        if (buyTax) txs.push(contract.setBuyTax(buyTax));
        if (sellTax) txs.push(contract.setSellTax(sellTax));
        if (marketingShare) txs.push(contract.setMarketingShare(marketingShare));
        if (burnShare) txs.push(contract.setBurnShare(burnShare));

        for (const txPromise of txs) {
          await (await txPromise).wait();
        }
        showToast('设置已应用！', 'success');
      } catch(e) { showToast(e.reason||e.message, 'error'); }
    }

    async function setWhitelist(status) {
      try {
        const raw = document.getElementById('wlAddresses').value;
        const addrs = raw.split(',').map(a => a.trim()).filter(a => a);
        if (addrs.length === 0) { showToast('请输入地址', 'error'); return; }
        await (await contract.setWhitelist(addrs, status)).wait();
        showToast('白名单已更新！', 'success');
      } catch(e) { showToast(e.reason||e.message, 'error'); }
    }

    async function setBlacklist(status) {
      try {
        const raw = document.getElementById('wlAddresses').value;
        const addrs = raw.split(',').map(a => a.trim()).filter(a => a);
        if (addrs.length === 0) { showToast('请输入地址', 'error'); return; }
        await (await contract.setBlacklist(addrs, status)).wait();
        showToast('黑名单已更新！', 'success');
      } catch(e) { showToast(e.reason||e.message, 'error'); }
    }

    async function toggleWhitelist() {
      try {
        const enabled = document.getElementById('wlEnabled').checked;
        await (await contract.setWhitelistEnabled(enabled)).wait();
        showToast('白名单模式已' + (enabled ? '启用' : '关闭'), 'success');
      } catch(e) { showToast(e.reason||e.message, 'error'); }
    }

    // ============ 初始化 ============
    autoReconnect();
  </script>
</body>
</html>
