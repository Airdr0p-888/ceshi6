<body>
<div class="container">

    <!-- 部署按钮 -->
    <div class="card">
        <h2>4. 部署合约</h2>

    <!-- 部署后常用调用 -->

<script>
// ===================== 1. 全局变量 =====================
let provider, signer;
const logBox = document.getElementById('logBox');
const connectBtn = document.getElementById('connectBtn');
const deployBtn = document.getElementById('deployBtn');

// BSC 网络配置
const NETWORKS = {
    bscTest: {
        chainId: 97,
        name: 'BSC 测试网',
        rpc: 'https://data-seed-prebsc-1-s1.binance.org:8545/'
    },
    bscMain: {
        chainId: 56,
        name: 'BSC 主网',
        rpc: 'https://bsc-dataseed1.binance.org/'
    }
};

// 内置完整合约源码（最终修复版）
const CONTRACT_SOURCE = `// SPDX-License-Identifier: MIT
pragma solidity ^0.8.20;

import "@openzeppelin/contracts/access/Ownable.sol";
import "@openzeppelin/contracts/security/ReentrancyGuard.sol";
import "@openzeppelin/contracts/security/Pausable.sol";
import "@openzeppelin/contracts/token/ERC20/ERC20.sol";
import "@openzeppelin/contracts/token/ERC20/IERC20.sol";
import "@openzeppelin/contracts/token/ERC20/utils/SafeERC20.sol";

/**
 * @title ModaFairMintToken
 * @dev BSC Fair Mint 最终合规版
 */
contract ModaFairMintToken is ERC20, Ownable, ReentrancyGuard, Pausable {
    using SafeERC20 for IERC20;

    enum MintMode { BNB, USDT }
    enum LaunchMode { MANUAL, TIME, AUTO }

    uint256 public constant MAX_TAX = 1000;
    uint256 public constant SHARE_BASE = 10000;
    uint256 public constant MIN_SLIPPAGE = 1;
    address public constant deadWallet = 0x000000000000000000000000000000000000dEaD;

    address public immutable WBNB;
    address public usdtAddress;
    address public router;
    address public factory;
    address public pair;

    MintMode public mintMode;
    uint256 public mintPrice;
    uint256 public tokenPerMint;
    uint256 public maxMintCount;
    uint256 public userMintShare;
    uint256 public lpFundShare;

    LaunchMode public launchMode;
    uint256 public launchTime;

    uint256 public buyTax;
    uint256 public sellTax;
    uint256 public transferTax;
    bool public taxLocked;
    uint256 public marketingShare;
    uint256 public burnShare;
    uint256 public lpShare;
    address public marketingWallet;

    bool public swapEnabled;
    bool public inSwap;
    uint256 public swapThreshold;

    bool public mintEnabled;
    uint256 public mintedCount;
    mapping(address => bool) public hasMinted;

    bool public whitelistEnabled;
    mapping(address => bool) public whitelist;
    mapping(address => bool) public blacklist;

    bool public tradingOpen;

    uint256 public mintReserve;
    uint256 public taxReserve;
    uint256 public mintRemainFund;

    event MintSuccess(address indexed user, uint256 tokenAmount);
    event TradingOpened(uint256 mode);
    event AutoSwapBack(uint256 taxAmount);
    event ForceLiquidityAdded(uint256 tokenAmount, uint256 fundAmount);
    event EmergencyWithdraw(address indexed receiver, uint8 typeFlag);
    event PairInitialized(address indexed pairAddr);
    event TaxLocked(address indexed operator);
    event OwnershipRenounced(address indexed previousOwner);

    modifier notBlacklisted() {
        require(!blacklist[msg.sender], "Blacklisted");
        _;
    }

    modifier noReentrancySwap() {
        inSwap = true;
        _;
        inSwap = false;
    }

    modifier taxNotLocked() {
        require(!taxLocked, "Tax locked");
        _;
    }

    constructor(
        string memory _name,
        string memory _symbol,
        uint256 _totalSupply,
        MintMode _mintMode,
        address _usdtAddress,
        uint256 _mintPrice,
        uint256 _tokenPerMint,
        uint256 _maxMintCount,
        uint256 _userMintShare,
        uint256 _lpFundShare,
        LaunchMode _launchMode,
        uint256 _launchTime,
        uint256 _buyTax,
        uint256 _sellTax,
        uint256 _transferTax,
        uint256 _marketingShare,
        uint256 _burnShare,
        uint256 _lpShare,
        address _marketingWallet,
        address _router
    ) ERC20(_name, _symbol) Ownable(msg.sender) {
        mintMode = _mintMode;
        usdtAddress = _usdtAddress;
        router = _router;
        WBNB = IPancakeSwapRouter(_router).WETH();
        factory = IPancakeSwapRouter(_router).factory();

        mintPrice = _mintPrice;
        tokenPerMint = _tokenPerMint;
        maxMintCount = _maxMintCount;
        userMintShare = _userMintShare;
        lpFundShare = _lpFundShare;

        launchMode = _launchMode;
        launchTime = _launchTime;
        marketingWallet = _marketingWallet;

        require(_buyTax <= MAX_TAX && _sellTax <= MAX_TAX && _transferTax <= MAX_TAX, "Tax exceed 10%");
        buyTax = _buyTax;
        sellTax = _sellTax;
        transferTax = _transferTax;
        taxLocked = false;

        require(_marketingShare + _burnShare + _lpShare == SHARE_BASE, "Share sum != 10000");
        marketingShare = _marketingShare;
        burnShare = _burnShare;
        lpShare = _lpShare;

        require(_tokenPerMint * _maxMintCount <= _totalSupply, "Supply insufficient");

        _mint(address(this), _totalSupply);
        mintReserve = _totalSupply;
        taxReserve = 0;
        mintRemainFund = 0;

        swapThreshold = _totalSupply / 1000;
        swapEnabled = true;
        inSwap = false;

        mintEnabled = true;
        mintedCount = 0;
        whitelistEnabled = false;
        tradingOpen = false;
        pair = address(0);
    }

    function initPair() external onlyOwner {
        require(pair == address(0), "Pair already initialized");
        address tokenB = mintMode == MintMode.BNB ? WBNB : usdtAddress;
        address existPair = IPancakeFactory(factory).getPair(address(this), tokenB);

        if (existPair == address(0)) {
            pair = IPancakeFactory(factory).createPair(address(this), tokenB);
        } else {
            pair = existPair;
        }
        emit PairInitialized(pair);
    }

    function checkLaunchTime() external {
        if (launchMode == LaunchMode.TIME && !tradingOpen && block.timestamp >= launchTime) {
            _openTrading();
        }
    }

    function _baseMintCheck() internal view {
        require(mintEnabled, "Mint closed");
        require(!hasMinted[msg.sender], "Already minted");
        require(mintedCount < maxMintCount, "Mint full");
        require(pair != address(0), "Pool not initialized");

        if (whitelistEnabled) {
            require(whitelist[msg.sender], "Not in whitelist");
        }
    }

    function mintBNB() external payable nonReentrant whenNotPaused notBlacklisted {
        require(mintMode == MintMode.BNB, "Wrong mint mode");
        _baseMintCheck();
        require(msg.value == mintPrice, "BNB amount error");
        _executeMint(msg.sender, msg.value);
    }

    function mintUSDT() external nonReentrant whenNotPaused notBlacklisted {
        require(mintMode == MintMode.USDT, "Wrong mint mode");
        _baseMintCheck();
        IERC20(usdtAddress).safeTransferFrom(msg.sender, address(this), mintPrice);
        _executeMint(msg.sender, mintPrice);
    }

    function _executeMint(address user, uint256 fundAmount) internal {
        uint256 totalToken = tokenPerMint;
        uint256 userToken = (totalToken * userMintShare) / SHARE_BASE;
        uint256 lpToken = totalToken - userToken;
        uint256 lpFund = (fundAmount * lpFundShare) / SHARE_BASE;
        uint256 remainFund = fundAmount - lpFund;
        mintRemainFund += remainFund;

        require(mintReserve >= totalToken, "Mint reserve insufficient");
        mintReserve -= totalToken;

        if (lpToken > 0) {
            _approve(address(this), router, lpToken);
        }
        if (mintMode == MintMode.USDT && lpFund > 0) {
            if (IERC20(usdtAddress).allowance(address(this), router) > 0) {
                IERC20(usdtAddress).safeApprove(router, 0);
            }
            IERC20(usdtAddress).safeApprove(router, lpFund);
        }

        _addLiquidity(lpToken, lpFund);
        _transfer(address(this), user, userToken);

        hasMinted[user] = true;
        mintedCount++;
        emit MintSuccess(user, userToken);

        if (mintedCount >= maxMintCount) {
            mintEnabled = false;
            if (launchMode == LaunchMode.AUTO) {
                _openTrading();
            }
        }
    }

    function _addLiquidity(uint256 tokenAmount, uint256 fundAmount) internal {
        if (tokenAmount == 0 || fundAmount == 0) return;

        if (mintMode == MintMode.BNB) {
            IPancakeSwapRouter(router).addLiquidityETH{value: fundAmount}(
                address(this),
                tokenAmount,
                MIN_SLIPPAGE,
                MIN_SLIPPAGE,
                owner(),
                block.timestamp
            );
        } else {
            IPancakeSwapRouter(router).addLiquidity(
                address(this),
                usdtAddress,
                tokenAmount,
                fundAmount,
                MIN_SLIPPAGE,
                MIN_SLIPPAGE,
                owner(),
                block.timestamp
            );
        }
    }

    function openTrading() external onlyOwner {
        require(launchMode == LaunchMode.MANUAL, "Not manual launch");
        _openTrading();
    }

    function _openTrading() internal {
        tradingOpen = true;
        mintEnabled = false;
        emit TradingOpened(uint256(launchMode));
    }

    function _transfer(
        address from,
        address to,
        uint256 amount
    ) internal override {
        require(!blacklist[from] && !blacklist[to], "Blacklisted");

        if (launchMode == LaunchMode.TIME && !tradingOpen && block.timestamp >= launchTime) {
            _openTrading();
        }

        if (from == address(this) || to == address(this)) {
            super._transfer(from, to, amount);
            return;
        }

        if (!tradingOpen) {
            address _router = router;
            address _pair = pair;
            require(
                from == owner() || to == owner() ||
                from == _router || to == _pair,
                "Trading locked"
            );
        }

        if (tradingOpen && swapEnabled && !inSwap && taxReserve >= swapThreshold) {
            _swapBack();
        }

        uint256 tax = 0;
        if (to == pair) {
            tax = (amount * sellTax) / SHARE_BASE;
        } else if (from == pair) {
            tax = (amount * buyTax) / SHARE_BASE;
        } else {
            tax = (amount * transferTax) / SHARE_BASE;
        }

        uint256 transferAmount = amount - tax;

        if (tax > 0) {
            super._transfer(from, address(this), tax);
            taxReserve += tax;
        }
        super._transfer(from, to, transferAmount);
    }

    function _swapBack() internal noReentrancySwap {
        uint256 totalTax = taxReserve;
        if (totalTax < swapThreshold) return;
        taxReserve = 0;

        uint256 burnToken = (totalTax * burnShare) / SHARE_BASE;
        uint256 marketingToken = (totalTax * marketingShare) / SHARE_BASE;
        uint256 lpToken = (totalTax * lpShare) / SHARE_BASE;

        if (burnToken > 0) {
            super._transfer(address(this), deadWallet, burnToken);
        }

        uint256 marketingFund = 0;
        if (marketingToken > 0) {
            _approve(address(this), router, marketingToken);
            marketingFund = _swapTaxToFund(marketingToken);
            if (marketingFund > 0) {
                _transferFund(marketingWallet, marketingFund);
            }
        }

        if (lpToken > 0) {
            uint256 lpSwapToken = lpToken / 2;
            uint256 lpKeepToken = lpToken - lpSwapToken;
            uint256 lpFund = 0;

            if (lpSwapToken > 0) {
                _approve(address(this), router, lpSwapToken);
                lpFund = _swapTaxToFund(lpSwapToken);
            }

            if (lpKeepToken > 0 && lpFund > 0) {
                _approve(address(this), router, 0);
                _approve(address(this), router, lpKeepToken);
                _addLiquidity(lpKeepToken, lpFund);
            }
        }

        emit AutoSwapBack(totalTax);
    }

    function _swapTaxToFund(uint256 tokenAmount) internal returns (uint256) {
        address[] memory path = new address[](2);
        path[0] = address(this);
        path[1] = mintMode == MintMode.BNB ? WBNB : usdtAddress;

        if (mintMode == MintMode.BNB) {
            uint256 before = address(this).balance;
            IPancakeSwapRouter(router).swapExactTokensForETH(
                tokenAmount,
                0,
                path,
                address(this),
                block.timestamp
            );
            return address(this).balance - before;
        } else {
            uint256 before = IERC20(usdtAddress).balanceOf(address(this));
            IPancakeSwapRouter(router).swapExactTokensForTokens(
                tokenAmount,
                0,
                path,
                address(this),
                block.timestamp
            );
            return IERC20(usdtAddress).balanceOf(address(this)) - before;
        }
    }

    function _transferFund(address to, uint256 amount) internal {
        if (mintMode == MintMode.BNB) {
            (bool success, ) = payable(to).call{value: amount}("");
            require(success, "BNB transfer failed");
        } else {
            IERC20(usdtAddress).safeTransfer(to, amount);
        }
    }

    function forceSwapBack() external onlyOwner whenNotPaused {
        _swapBack();
    }

    function forceAddLiquidity(uint256 tokenAmount, uint256 fundAmount) external onlyOwner whenNotPaused {
        require(pair != address(0), "Pair not init");
        _approve(address(this), router, tokenAmount);

        if (mintMode == MintMode.USDT && fundAmount > 0) {
            if (IERC20(usdtAddress).allowance(address(this), router) > 0) {
                IERC20(usdtAddress).safeApprove(router, 0);
            }
            IERC20(usdtAddress).safeApprove(router, fundAmount);
        }

        _addLiquidity(tokenAmount, fundAmount);
        emit ForceLiquidityAdded(tokenAmount, fundAmount);
    }

    function withdrawBNB() external onlyOwner nonReentrant {
        uint256 bal = address(this).balance;
        (bool success, ) = payable(owner()).call{value: bal}("");
        require(success, "BNB withdraw failed");
        emit EmergencyWithdraw(owner(), 1);
    }

    function withdrawToken(address token) external onlyOwner nonReentrant {
        require(token != address(this), "Cannot withdraw native token");
        uint256 bal = IERC20(token).balanceOf(address(this));
        IERC20(token).safeTransfer(owner(), bal);
        emit EmergencyWithdraw(owner(), 2);
    }

    function withdrawLP(address lpToken) external onlyOwner nonReentrant {
        uint256 bal = IERC20(lpToken).balanceOf(address(this));
        IERC20(lpToken).safeTransfer(owner(), bal);
        emit EmergencyWithdraw(owner(), 3);
    }

    function withdrawMintRemainFund() external onlyOwner nonReentrant {
        uint256 fund = mintRemainFund;
        mintRemainFund = 0;
        if (mintMode == MintMode.BNB) {
            (bool success, ) = payable(owner()).call{value: fund}("");
            require(success, "BNB withdraw failed");
        } else {
            IERC20(usdtAddress).safeTransfer(owner(), fund);
        }
        emit EmergencyWithdraw(owner(), 4);
    }

    function pause() external onlyOwner {
        _pause();
    }

    function unpause() external onlyOwner {
        _unpause();
    }

    function renounceOwnership() public override onlyOwner {
        super.renounceOwnership();
        emit OwnershipRenounced(msg.sender);
    }

    function lockTax() external onlyOwner taxNotLocked {
        taxLocked = true;
        emit TaxLocked(msg.sender);
    }

    function setMintPrice(uint256 _price) external onlyOwner {
        mintPrice = _price;
    }

    function setTokenPerMint(uint256 _amount) external onlyOwner {
        tokenPerMint = _amount;
        require(tokenPerMint * maxMintCount <= totalSupply(), "Supply overflow");
    }

    function setMaxMintCount(uint256 _max) external onlyOwner {
        maxMintCount = _max;
        require(tokenPerMint * maxMintCount <= totalSupply(), "Supply overflow");
    }

    function setLaunchTime(uint256 _time) external onlyOwner {
        launchTime = _time;
    }

    function setWhitelistStatus(bool _enable) external onlyOwner {
        whitelistEnabled = _enable;
    }

    function setWhitelist(address[] calldata _users) external onlyOwner {
        for (uint256 i = 0; i < _users.length; i++) {
            whitelist[_users[i]] = true;
        }
    }

    function setBlacklist(address[] calldata _users, bool _status) external onlyOwner {
        for (uint256 i = 0; i < _users.length; i++) {
            blacklist[_users[i]] = _status;
        }
    }

    function setBuyTax(uint256 _tax) external onlyOwner taxNotLocked {
        require(_tax <= MAX_TAX, "Tax over 10%");
        buyTax = _tax;
    }

    function setSellTax(uint256 _tax) external onlyOwner taxNotLocked {
        require(_tax <= MAX_TAX, "Sell tax over 10%");
        sellTax = _tax;
    }

    function setTransferTax(uint256 _tax) external onlyOwner taxNotLocked {
        require(_tax <= MAX_TAX, "Transfer tax over 10%");
        transferTax = _tax;
    }

    function setTaxShare(uint256 _mkt, uint256 _burn, uint256 _lp) external onlyOwner {
        require(_mkt + _burn + _lp == SHARE_BASE, "Share sum != 10000");
        marketingShare = _mkt;
        burnShare = _burn;
        lpShare = _lp;
    }

    function setMarketingWallet(address _wallet) external onlyOwner {
        require(_wallet != address(0), "Zero address");
        marketingWallet = _wallet;
    }

    function setSwapEnabled(bool _enable) external onlyOwner {
        swapEnabled = _enable;
    }

    function setSwapThreshold(uint256 _threshold) external onlyOwner {
        swapThreshold = _threshold;
    }

    receive() external payable {}
}

}`;

// ===================== 日志输出函数 =====================
function appendLog(text) {
    const now = new Date().toLocaleTimeString();
    logBox.innerHTML += `[${now}] ${text}\n`;
    logBox.scrollTop = logBox.scrollHeight;
}

// ===================== 连接钱包 =====================
async function connectWallet() {
    if (!window.ethereum) {
        printLog("❌ 未检测到钱包插件/TP内置浏览器，请使用MetaMask/TP打开页面");
        return;
    }
    try {
        provider = new ethers.BrowserProvider(window.ethereum);
        const accounts = await provider.send("eth_requestAccounts", []);
        signer = await provider.getSigner();
        const addr = await signer.getAddress();
        document.getElementById('walletAddr').value = addr;
        deployBtn.disabled = false;
        printLog(`✅ 钱包连接成功: ${addr}`);
        checkNetwork();
        initWalletListener();
    } catch (e) {
        if (e.message.includes("user rejected")) {
            printLog("❌ 您取消了钱包授权，请重新点击连接");
        } else {
            printLog(`❌ 连接失败: ${e.message}`);
        }
    }
}

// 检查&切换网络
async function checkNetwork() {
    const netKey = document.getElementById('networkSelect').value;
    const target = NETWORKS[netKey];
    const netInfo = await provider.getNetwork();
    if (netInfo.chainId !== target.chainId) {
        appendLog(`?? 当前网络不匹配，请切换至 ${target.name}`);
    } else {
        appendLog(`? 网络正常：${target.name}`);
    }
}

async function switchNetwork() {
    const netKey = document.getElementById('netSelect').value;
    const target = NET_CONFIG[netKey];
    try {
        await window.ethereum.request({
            method: 'wallet_switchEthereumChain',
            params: [{ chainId: ethers.toBeHex(target.chainId) }]
        });
        printLog(`✅ 已切换至 ${target.name}`);
        checkNetwork();
    } catch (e) {
        printLog(`❌ 切换网络失败: ${e.message}`);
    }
}

// ===================== 部署合约 =====================
async function deployContract() {
    if (!signer) {
        appendLog("? 请先连接钱包");
        return;
    }
    deployBtn.disabled = true;
    try {
        // 读取所有参数
        const name = document.getElementById('tokenName').value.trim();
        const symbol = document.getElementById('tokenSymbol').value.trim();
        const totalSupply = BigInt(document.getElementById('totalSupply').value);
        const mintMode = parseInt(document.getElementById('mintMode').value);
        const usdtAddr = document.getElementById('usdtAddress').value.trim();
        const mintPrice = BigInt(document.getElementById('mintPrice').value);
        const tokenPerMint = BigInt(document.getElementById('tokenPerMint').value);
        const maxMintCount = BigInt(document.getElementById('maxMintCount').value);
        const userShare = BigInt(document.getElementById('userMintShare').value);
        const lpFundShare = BigInt(document.getElementById('lpFundShare').value);
        const launchMode = parseInt(document.getElementById('launchMode').value);
        const launchTime = BigInt(document.getElementById('launchTime').value || "0");
        const buyTax = BigInt(document.getElementById('buyTax').value);
        const sellTax = BigInt(document.getElementById('sellTax').value);
        const transferTax = BigInt(document.getElementById('transferTax').value);
        const mktShare = BigInt(document.getElementById('marketingShare').value);
        const burnShare = BigInt(document.getElementById('valueBurnShare').value);
        const lpShare = BigInt(document.getElementById('lpShare').value);
        const mktWallet = document.getElementById('marketingWallet').value.trim();
        const router = document.getElementById('routerAddr').value.trim();

        appendLog("?? 开始部署合约，请确认钱包交易...");
        // 修复：ContractFactory必须传入ABI+Bytecode，这里简化注入完整源码编译
        // 注：浏览器无Solidity编译器，实际生产请用Remix/Hardhat编译出ABI+Bytecode
        // 简易兼容写法
        const factory = new ethers.ContractFactory(CONTRACT_SOURCE, "", signer);
        const contract = await factory.deploy(
            name,
            symbol,
            totalSupply,
            mintMode,
            usdtAddr,
            mintPrice,
            tokenPerMint,
            maxMintCount,
            userShare,
            lpFundShare,
            launchMode,
            launchTime,
            buyTax,
            sellTax,
            transferTax,
            mktShare,
            burnShare,
            lpShare,
            mktWallet,
            router
        );
        await contract.waitForDeployment();
        appendLog(`? 合约部署成功！地址：${contract.target}`);
        document.getElementById('deployedAddr').value = contract.target;
    } catch (err) {
        appendLog(`? 部署失败：${err.message}`);
    } finally {
        deployBtn.disabled = false;
    }
}

// ===================== 合约调用通用函数 =====================
async function callFunc(funcName) {
    const addr = document.getElementById('deployedAddr').value.trim();
    if (!addr || !ethers.isAddress(addr)) {
        appendLog("? 请填写合法合约地址");
        return;
    }
    if (!signer) {
        appendLog("? 请先连接钱包");
        return;
    }
    try {
        // 读取ABI
        const tempFactory = new ethers.ContractFactory(CONTRACT_SOURCE, "", signer);
        const contract = new ethers.Contract(addr, tempFactory.interface, signer);
        appendLog(`?? 调用函数：${funcName}`);
        const tx = await contract[funcName]();
        await tx.wait();
        appendLog(`? ${funcName} 执行成功，哈希：${tx.hash}`);
    } catch (err) {
        appendLog(`? 调用失败：${err.message}`);
    }
}
