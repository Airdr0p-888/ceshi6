<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moda 公平发射平台</title>
  <link rel="stylesheet" href="common.css">
  <style>
    .token-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; margin-top: 16px; }
    .token-card { background: var(--bg2); border-radius: 12px; padding: 20px; border: 1px solid var(--border); transition: all 0.2s; cursor: pointer; position: relative; }
    .token-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    .token-card .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
    .badge-bnb { background: #f0b90b20; color: #f0b90b; }
    .badge-usdt { background: #26a17b20; color: #26a17b; }
    .token-card .name { font-size: 1.15rem; font-weight: 700; margin-bottom: 4px; }
    .token-card .symbol { font-size: 0.85rem; color: var(--accent); margin-bottom: 12px; }
    .token-card .row { display: flex; justify-content: space-between; font-size: 0.8rem; padding: 4px 0; }
    .token-card .label { color: var(--text2); }
    .token-card .val { color: var(--text1); font-weight: 500; }
    .token-card .addr { font-family: monospace; font-size: 0.7rem; color: var(--text2); margin-top: 10px; word-break: break-all; }
    .token-card .actions { display: flex; gap: 8px; margin-top: 14px; }
    .token-card .actions .btn { flex: 1; font-size: 0.8rem; padding: 8px 12px; }
    .token-card .tag-owner { position: absolute; top: 12px; right: 12px; font-size: 0.65rem; background: var(--accent); color: #fff; padding: 2px 6px; border-radius: 4px; }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text2); }
    .empty-state .icon { font-size: 3rem; margin-bottom: 16px; }
    .empty-state h3 { margin-bottom: 8px; color: var(--text1); }
    .empty-state p { margin-bottom: 20px; }
    .chain-filter { display: flex; gap: 8px; margin-bottom: 12px; }
    .chain-filter .chip { padding: 4px 14px; border-radius: 20px; font-size: 0.8rem; cursor: pointer; border: 1px solid var(--border); background: var(--bg2); color: var(--text2); transition: all 0.2s; }
    .chain-filter .chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .refresh-hint { text-align: center; font-size: 0.75rem; color: var(--text2); margin-top: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <!-- 头部 -->
    <div class="header">
      <h1>🚀 <span>Moda</span> 公平发射</h1>
      <p class="subtitle">BSC 链公平发射代币 — 铸造 · 交易 · 收益</p>
    </div>

    <!-- 连接栏 -->
    <div class="connect-bar">
      <div class="connect-left">
        <a href="index.html" class="btn btn-sm" style="background:var(--accent);color:#fff;text-decoration:none;border-radius:8px;font-weight:600">🏠 首页</a>
        <a href="deploy.html" class="btn btn-sm btn-outline" style="text-decoration:none">🚀 一键部署</a>
        <a href="#" class="btn btn-sm btn-outline" style="text-decoration:none" id="linkAdmin" onclick="goToCurrentAdmin()">⚙️ 管理</a>
      </div>
      <div class="connect-right">
        <span id="chainBadge" class="chain-badge hidden">BSC 测试网</span>
        <span id="addressBadge" class="address-badge hidden">未连接</span>
        <button id="btnConnect" class="btn btn-primary" onclick="connectWallet()">🔌 连接钱包</button>
        <button id="btnDisconnect" class="btn btn-outline hidden" onclick="disconnectWallet()">断开连接</button>
      </div>
    </div>

    <!-- 头部操作 -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <h3 style="margin:0">📋 我的代币</h3>
      <div style="display:flex;gap:8px;align-items:center">
        <span id="tokenCount" style="font-size:0.85rem;color:var(--text2)">0 个代币</span>
        <button class="btn btn-sm btn-outline" onclick="refreshTokenList()">🔄 刷新</button>
      </div>
    </div>

    <!-- 提示：不同设备数据不互通 -->
    <div class="alert alert-info" style="font-size:0.8rem;margin-bottom:12px">
      💡 代币列表保存在浏览器本地。如需跨设备访问，可点击代币卡片通过合约地址直接进入。
    </div>

    <!-- 代币列表 -->
    <div id="tokenListContainer">
      <div class="empty-state">
        <div class="icon">📭</div>
        <h3>还没有部署代币</h3>
        <p>去「一键部署」创建你的第一个公平发射代币吧！</p>
        <a href="deploy.html" class="btn btn-gold">🚀 立即部署</a>
      </div>
    </div>

    <!-- 手动添加 -->
    <div class="card" style="margin-top:20px">
      <h3>🔗 通过合约地址访问</h3>
      <div style="display:flex;gap:10px;align-items:flex-end">
        <div class="form-group" style="flex:1;margin:0">
          <label>合约地址</label>
          <input type="text" id="manualAddress" placeholder="0x..." />
        </div>
        <button class="btn btn-primary" onclick="goToAddress()" style="flex-shrink:0">进入铸造页</button>
      </div>
    </div>
  </div>

  <div id="toastContainer"></div>

  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.0/dist/ethers.umd.min.js"></script>
  <script src="common.js"></script>
  <script>
    let currentChainId = '97';

    // ============ 渲染代币列表 ============
    async function refreshTokenList() {
      const container = document.getElementById('tokenListContainer');
      const tokens = getTokenList();
      document.getElementById('tokenCount').textContent = tokens.length + ' 个代币';

      if (tokens.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="icon">📭</div>
            <h3>还没有部署代币</h3>
            <p>去「一键部署」创建你的第一个公平发射代币吧！</p>
            <a href="deploy.html" class="btn btn-gold">🚀 立即部署</a>
          </div>`;
        return;
      }

      // 只读 provider 批量加载链上数据
      let readProvider = null;
      try {
        readProvider = new ethers.JsonRpcProvider(BSC_RPCS['97'], undefined, { staticNetwork: true });
      } catch(e) {}

      let cardsHtml = '';
      for (const t of tokens) {
        let name = t.name || '-';
        let symbol = t.symbol || '-';
        let mintedCount = '-';
        let maxMint = t.maxMintCount || '-';
        let progress = 0;
        let isMyToken = false;

        // 尝试读取链上数据
        if (readProvider) {
          try {
            const c = new ethers.Contract(t.address, CONTRACT_ABI, readProvider);
            const results = await Promise.allSettled([
              c.name(), c.symbol(), c.mintedCount(), c.maxMintCount(), c.owner()
            ]);
            if (results[0].status === 'fulfilled') name = results[0].value;
            if (results[1].status === 'fulfilled') symbol = results[1].value;
            if (results[2].status === 'fulfilled') mintedCount = Number(results[2].value);
            if (results[3].status === 'fulfilled') maxMint = Number(results[3].value);
            if (results[4].status === 'fulfilled' && userAddress) {
              isMyToken = results[4].value.toLowerCase() === userAddress.toLowerCase();
            }
            progress = maxMint > 0 ? (mintedCount / maxMint * 100) : 0;
          } catch(e) {}
        }

        const modeLabel = Number(t.mintMode) === 0 ? 'BNB' : 'USDT';
        const modeClass = Number(t.mintMode) === 0 ? 'badge-bnb' : 'badge-usdt';
        const timeStr = new Date(t.deployTime).toLocaleDateString('zh-CN');

        cardsHtml += `
          <div class="token-card" onclick="goToMint('${t.address}')">
            ${isMyToken ? '<span class="tag-owner">我的</span>' : ''}
            <div class="name">${escapeHtml(name)}</div>
            <div class="symbol">$${escapeHtml(symbol)} <span class="badge ${modeClass}">${modeLabel}</span></div>
            <div class="row"><span class="label">进度</span><span class="val">${mintedCount} / ${maxMint}</span></div>
            <div style="height:4px;background:var(--border);border-radius:2px;margin:6px 0;overflow:hidden">
              <div style="height:100%;width:${Math.min(progress,100)}%;background:var(--accent);border-radius:2px;transition:width 0.3s"></div>
            </div>
            <div class="row"><span class="label">部署时间</span><span class="val">${timeStr}</span></div>
            <div class="addr">${t.address}</div>
            <div class="actions" onclick="event.stopPropagation()">
              <button class="btn btn-primary" onclick="goToMint('${t.address}')">🎯 铸造</button>
              <button class="btn btn-outline" onclick="goToAdmin('${t.address}')">⚙️ 管理</button>
              <button class="btn btn-outline" style="color:var(--red)" onclick="removeToken(event,'${t.address}')">🗑</button>
            </div>
          </div>`;
      }

      container.innerHTML = `<div class="token-grid">${cardsHtml}</div>`;
    }

    function escapeHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    // ============ 导航 ============
    function goToMint(addr) {
      window.location.href = 'mint.html?address=' + addr;
    }
    function goToAdmin(addr) {
      window.location.href = 'admin.html?address=' + addr;
    }
    function goToCurrentAdmin() {
      const tokens = getTokenList();
      if (tokens.length > 0) {
        goToAdmin(tokens[0].address);
      } else {
        showToast('还没有部署代币', 'info');
      }
    }
    function goToAddress() {
      const addr = document.getElementById('manualAddress').value.trim();
      if (!ethers.isAddress(addr)) { showToast('无效的合约地址', 'error'); return; }
      goToMint(addr);
    }

    async function removeToken(event, addr) {
      event.stopPropagation();
      if (!confirm('确定要从列表中移除这个代币吗？（不会影响链上合约）')) return;
      removeTokenFromLocal(addr);
      await refreshTokenList();
      showToast('已移除', 'info');
    }

    // ============ 连接后刷新列表 ============
    function onWalletConnected() {
      refreshTokenList();
    }

    function onWalletDisconnected() {
      refreshTokenList();
    }

    // ============ 初始化 ============
    autoReconnect();
    refreshTokenList();
  </script>
</body>
</html>
